name: Build Armbian X96Q H313 (Klipper Ready)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    steps:
    - name: Checkout helper repo
      uses: actions/checkout@v4

    - name: Set up QEMU for Cross-Compilation
      uses: docker/setup-qemu-action@v3

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git wget curl build-essential ccache bc bison flex python3 python3-pip python-is-python3 libncurses5-dev libssl-dev device-tree-compiler libtool unzip

    - name: Clone official Armbian build
      run: |
        git clone --depth=1 https://github.com/armbian/build build

    - name: Copy helper files into build tree
      run: |
        cp -r config build/ || true
        cp -r patch build/ || true
        cp -r userpatches build/ || true
        chmod +x build/userpatches/customize-image.sh || true

    - name: Inject Klipper USB Drivers
      run: |
        echo "CONFIG_USB_ACM=y" >> build/userpatches/linux-sunxi-current.config
        echo "CONFIG_USB_SERIAL_CH341=y" >> build/userpatches/linux-sunxi-current.config
        echo "CONFIG_USB_SERIAL_CP210X=y" >> build/userpatches/linux-sunxi-current.config

    # [BẢN VÁ 5]: Cứu hộ U-Boot! Đánh tráo bootloader X96Q sang Orange Pi Zero 2 (Cùng chip H313/H616)
    - name: Fix Missing U-Boot Defconfig
      run: |
        sed -i 's/x96q-h313_defconfig/orangepi_zero2_defconfig/g' build/config/boards/x96q-h313.conf

    - name: Start Armbian build (Server, Bookworm)
      working-directory: build
      run: |
        export DEBIAN_FRONTEND=noninteractive
        ./compile.sh build BOARD=x96q-h313 BRANCH=current RELEASE=bookworm BUILD_DESKTOP=no BUILD_MINIMAL=no KERNEL_CONFIGURE=no

    - name: Upload images artifact
      uses: actions/upload-artifact@v4
      with:
        name: Armbian-X96Q-Klipper
        path: "build/output/images/"
